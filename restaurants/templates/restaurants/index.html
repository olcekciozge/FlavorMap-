{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<h1>Restaurants</h1>

<ul>
{% for r in restaurants %}
    <li>
        <p>{{ r }}</p>
        <a href="{% url 'restaurants:detail' r.id %}">{{ r.name }}</a> - {{ r.city }} {{ r.district }}
    </li>
{% empty %}
    <li>No restaurants yet</li>
{% endfor %}
</ul>
{% endblock %}
