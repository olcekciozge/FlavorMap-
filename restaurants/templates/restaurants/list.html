{% extends "base.html" %}

{% block title %}All Restaurants{% endblock %}

{% block content %}
<h1>All Restaurants</h1>

<ul>
{% for r in restaurants %}
    <li>
        <a href="{% url 'restaurants:detail' r.id %}">{{ r.title }}</a> - {{ r.location }}
    </li>
{% empty %}
    <li>No restaurants yet</li>
{% endfor %}
</ul>
{% endblock %}
